name: smart_retail
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  cupertino_icons: ^1.0.8
  sqflite_common_ffi_web: ^1.0.1+1
  sqflite_common_ffi: ^2.3.4
  sqflite: ^2.4.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  equatable: ^2.0.7
  freezed_annotation: ^3.1.0
  fl_chart: ^1.1.1 # Added
  flutter_stripe: ^12.0.2
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.5
  flutter_esc_pos_utils: ^1.0.1
  flutter_bluetooth_serial: ^0.4.0
  permission_handler: ^12.0.1
  flutter_reactive_ble: ^5.4.0
  printing: ^5.10.0
  pdf: ^3.10.1
  # Bluetooth printing transport and ESC-POS utils
  bluetooth_print:
    path: ./third_party/bluetooth_print

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
